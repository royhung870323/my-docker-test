name: Docker CI/CD 練習

on:
  push:
    branches: [ "main" ]

# 給予機器人權限寫入套件
permissions:
  packages: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 下載程式碼
        uses: actions/checkout@v4

      - name: 2. 登入 GitHub 儲藏室 (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 3. 編譯並上傳 Image
        run: |
          # 注意：這裡的名稱要全小寫！
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/my-web-app:latest
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME
